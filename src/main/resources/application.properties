spring.application.name=locomotora-backend

spring.datasource.url=jdbc:postgresql://localhost:5433/locomotora
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true

locomotora.jwt.secret=${LOCOMOTORA_JWT_SECRET:change-this-secret-in-production}
locomotora.jwt.expiration-minutes=${LOCOMOTORA_JWT_EXPIRATION_MINUTES:1440}
locomotora.cors.allowed-origins=${LOCOMOTORA_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006,http://localhost:3000}
