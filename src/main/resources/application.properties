spring.application.name=locomotora-backend

server.address=${SERVER_ADDRESS:0.0.0.0}
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/locomotora}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true

locomotora.jwt.secret=${LOCOMOTORA_JWT_SECRET:change-this-secret-in-production}
locomotora.jwt.expiration-minutes=${LOCOMOTORA_JWT_EXPIRATION_MINUTES:1440}
locomotora.cors.allowed-origin-patterns=${LOCOMOTORA_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*}
